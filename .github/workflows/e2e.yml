# ═══════════════════════════════════════════════════════════════
# FILE: .github/workflows/master-pipeline.yml
# REPO: naveenanimation20/OpenCartWebAPIFramework
# DEV REPO: jglick/simple-maven-project-with-tests
# ═══════════════════════════════════════════════════════════════

name: e2e CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Run up to environment'
        required: true
        default: 'QA'
        type: choice
        options:
          - dev
          - QA
          - stage
          - Prod

jobs:

  # ═════════════════════════════════════════════════════
  # STEP 1: BUILD APP + UNIT TESTS (DEV REPO - MAVEN)
  # ═════════════════════════════════════════════════════
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DEV repo
        uses: actions/checkout@v4
        with:
          repository: jglick/simple-maven-project-with-tests

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build & Run Unit Tests
        run: |
          echo "========================================="
          echo "  Building App + Running Unit Tests"
          echo "========================================="
          mvn clean install

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # STEP 2: DEPLOY DEV + SANITY TESTS
  # ═════════════════════════════════════════════════════
  deploy-dev:
    name: Deploy to DEV
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DEV
        run: echo "Deployed to DEV ✅"

  sanity-dev:
    name: DEV - Sanity Tests
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4
        with:
          repository: naveenanimation20/OpenCartWebAPIFramework

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache-dev
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.pw-cache-dev.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache-dev.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Sanity Tests on DEV
        run: |
          echo "========================================="
          echo "  Running SANITY @smoke on DEV"
          echo "========================================="
          npx playwright test --project=chromium --grep @smoke
        env:
          ENV: dev
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload DEV HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-sanity-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload DEV Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-sanity-allure-report
          path: allure-report/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # STEP 3: DEPLOY QA + REGRESSION TESTS
  # ═════════════════════════════════════════════════════
  deploy-qa:
    name: Deploy to QA
    needs: sanity-dev
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to QA
        run: echo "Deployed to QA ✅"

  regression-qa:
    name: QA - Regression Tests
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4
        with:
          repository: naveenanimation20/OpenCartWebAPIFramework

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache-qa
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.pw-cache-qa.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache-qa.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Regression Tests on QA
        run: |
          echo "========================================="
          echo "  Running REGRESSION (all tests) on QA"
          echo "========================================="
          npx playwright test --project=chromium
        env:
          ENV: qa
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload QA HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-regression-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload QA Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-regression-allure-report
          path: allure-report/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # STEP 4: DEPLOY STAGE + SANITY TESTS
  # ═════════════════════════════════════════════════════
  deploy-stage:
    name: Deploy to STAGE
    needs: regression-qa
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to STAGE
        run: echo "Deployed to STAGE ✅"

  sanity-stage:
    name: STAGE - Sanity Tests
    needs: deploy-stage
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4
        with:
          repository: naveenanimation20/OpenCartWebAPIFramework

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache-stage
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.pw-cache-stage.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache-stage.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Sanity Tests on STAGE
        run: |
          echo "========================================="
          echo "  Running SANITY @smoke on STAGE"
          echo "========================================="
          npx playwright test --project=chromium --grep @smoke
        env:
          ENV: stage
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload STAGE HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-sanity-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload STAGE Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-sanity-allure-report
          path: allure-report/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # STEP 5: DEPLOY PROD + SMOKE TESTS
  # ═════════════════════════════════════════════════════
  deploy-prod:
    name: Deploy to PROD
    needs: sanity-stage
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Deploy to PROD
        run: echo "Deployed to PROD ✅"

  smoke-prod:
    name: PROD - Smoke Tests
    needs: deploy-prod
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4
        with:
          repository: naveenanimation20/OpenCartWebAPIFramework

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache-prod
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.pw-cache-prod.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only
        if: steps.pw-cache-prod.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Smoke Tests on PROD
        run: |
          echo "========================================="
          echo "  Running SMOKE @smoke on PROD"
          echo "========================================="
          npx playwright test --project=chromium --grep @smoke
        env:
          ENV: prod
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GRANT_TYPE: ${{ secrets.GRANT_TYPE }}

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload PROD HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload PROD Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-allure-report
          path: allure-report/

  # ═════════════════════════════════════════════════════
  # PIPELINE NOTIFICATION — EMAIL + SLACK
  # ═════════════════════════════════════════════════════
  notify:
    name: Send Reports — Email + Slack
    needs: [build, sanity-dev, regression-qa, sanity-stage, smoke-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Set Status Emoji
        id: status
        run: |
          BUILD="${{ needs.build.result }}"
          DEV="${{ needs.sanity-dev.result }}"
          QA="${{ needs.regression-qa.result }}"
          STAGE="${{ needs.sanity-stage.result }}"
          PROD="${{ needs.smoke-prod.result }}"

          get_emoji() { if [ "$1" = "success" ]; then echo "✅"; elif [ "$1" = "skipped" ]; then echo "⏭️"; else echo "❌"; fi; }

          echo "build=$(get_emoji $BUILD)" >> $GITHUB_OUTPUT
          echo "dev=$(get_emoji $DEV)" >> $GITHUB_OUTPUT
          echo "qa=$(get_emoji $QA)" >> $GITHUB_OUTPUT
          echo "stage=$(get_emoji $STAGE)" >> $GITHUB_OUTPUT
          echo "prod=$(get_emoji $PROD)" >> $GITHUB_OUTPUT

          if [ "$BUILD" = "success" ] && [ "$DEV" = "success" ] && [ "$QA" = "success" ] && [ "$STAGE" = "success" ] && [ "$PROD" = "success" ]; then
            echo "overall=✅ ALL PASSED" >> $GITHUB_OUTPUT
            echo "overall_color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "overall=❌ SOME FAILURES" >> $GITHUB_OUTPUT
            echo "overall_color=#dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Create HTML Dashboard
        run: |
          cat > dashboard.html << 'DASHBOARD'
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
              .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
              .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 30px; text-align: center; }
              .header h1 { margin: 0; font-size: 24px; }
              .header p { margin: 8px 0 0; opacity: 0.8; font-size: 14px; }
              .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 12px; }
              .pass { background: #28a745; color: white; }
              .fail { background: #dc3545; color: white; }
              .body { padding: 24px; }
              table { width: 100%; border-collapse: collapse; margin: 16px 0; }
              th { background: #f8f9fa; text-align: left; padding: 12px 16px; font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
              td { padding: 14px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
              .env-name { font-weight: 600; color: #1a1a2e; }
              .test-type { color: #666; font-size: 13px; }
              .status { font-size: 16px; text-align: center; }
              .reports { background: #f8f9fa; padding: 20px 24px; border-top: 1px solid #eee; }
              .reports h3 { margin: 0 0 12px; font-size: 16px; color: #333; }
              .report-link { display: inline-block; padding: 8px 16px; background: #1a1a2e; color: white; text-decoration: none; border-radius: 6px; margin: 4px 4px 4px 0; font-size: 13px; }
              .footer { text-align: center; padding: 16px; color: #999; font-size: 12px; border-top: 1px solid #eee; }
              .meta { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 13px; color: #666; }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="header">
                <h1>🎭 Playwright CI/CD Dashboard</h1>
                <p>Master Pipeline Report</p>
                <span class="status-badge OVERALL_CLASS">OVERALL_STATUS</span>
              </div>
              <div class="body">
                <div class="meta">
                  <span>🔀 Branch: <strong>BRANCH_NAME</strong></span>
                  <span>👤 TRIGGERED_BY</span>
                </div>
                <table>
                  <tr><th>Stage</th><th>Test Suite</th><th>Status</th></tr>
                  <tr><td class="env-name">🔨 Build</td><td class="test-type">Maven Unit Tests</td><td class="status">BUILD_STATUS</td></tr>
                  <tr><td class="env-name">🟢 DEV</td><td class="test-type">Sanity (@smoke)</td><td class="status">DEV_STATUS</td></tr>
                  <tr><td class="env-name">🔵 QA</td><td class="test-type">Regression (All Tests)</td><td class="status">QA_STATUS</td></tr>
                  <tr><td class="env-name">🟡 STAGE</td><td class="test-type">Sanity (@smoke)</td><td class="status">STAGE_STATUS</td></tr>
                  <tr><td class="env-name">🔴 PROD</td><td class="test-type">Smoke (@smoke)</td><td class="status">PROD_STATUS</td></tr>
                </table>
              </div>
              <div class="reports">
                <h3>📊 Reports</h3>
                <a class="report-link" href="RUN_URL">📁 View All Reports (Artifacts)</a>
                <a class="report-link" href="RUN_URL">🔍 View Pipeline Logs</a>
              </div>
              <div class="footer">
                Naveen Automation Labs | Playwright Framework | RUN_DATE
              </div>
            </div>
          </body>
          </html>
          DASHBOARD

          sed -i "s|OVERALL_STATUS|${{ steps.status.outputs.overall }}|g" dashboard.html
          if echo "${{ steps.status.outputs.overall }}" | grep -q "PASSED"; then
            sed -i "s|OVERALL_CLASS|pass|g" dashboard.html
          else
            sed -i "s|OVERALL_CLASS|fail|g" dashboard.html
          fi
          sed -i "s|BUILD_STATUS|${{ steps.status.outputs.build }}|g" dashboard.html
          sed -i "s|DEV_STATUS|${{ steps.status.outputs.dev }}|g" dashboard.html
          sed -i "s|QA_STATUS|${{ steps.status.outputs.qa }}|g" dashboard.html
          sed -i "s|STAGE_STATUS|${{ steps.status.outputs.stage }}|g" dashboard.html
          sed -i "s|PROD_STATUS|${{ steps.status.outputs.prod }}|g" dashboard.html
          sed -i "s|BRANCH_NAME|${{ github.ref_name }}|g" dashboard.html
          sed -i "s|TRIGGERED_BY|${{ github.actor }}|g" dashboard.html
          sed -i "s|RUN_URL|https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|g" dashboard.html
          sed -i "s|RUN_DATE|$(date +'%d %b %Y, %I:%M %p UTC')|g" dashboard.html

      - name: Send Email with Dashboard
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.hostinger.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🎭 CI/CD Pipeline — ${{ steps.status.outputs.overall }} — ${{ github.ref_name }}"
          to: naveen@naveenautomationlabs.com
          from: "CI Bot <${{ secrets.EMAIL_USERNAME }}>"
          html_body: file://dashboard.html

      - name: Send Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🎭 Playwright CI/CD Pipeline Report" }
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Overall: ${{ steps.status.outputs.overall }}*\n\n*Branch:* `${{ github.ref_name }}`  |  *Triggered by:* `${{ github.actor }}`" }
                },
                { "type": "divider" },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "${{ steps.status.outputs.build }}  *Build* — Maven Unit Tests\n${{ steps.status.outputs.dev }}  *DEV* — Sanity (@smoke)\n${{ steps.status.outputs.qa }}  *QA* — Regression (All Tests)\n${{ steps.status.outputs.stage }}  *STAGE* — Sanity (@smoke)\n${{ steps.status.outputs.prod }}  *PROD* — Smoke (@smoke)" }
                },
                { "type": "divider" },
                {
                  "type": "actions",
                  "elements": [{ "type": "button", "text": { "type": "plain_text", "text": "📁 View Reports" }, "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" }]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Pipeline Summary
        run: |
          echo "═══════════════════════════════════════════"
          echo "       MASTER CI/CD PIPELINE SUMMARY"
          echo "═══════════════════════════════════════════"
          echo "  Build + Unit:    ${{ needs.build.result }}"
          echo "  DEV Sanity:      ${{ needs.sanity-dev.result }}"
          echo "  QA Regression:   ${{ needs.regression-qa.result }}"
          echo "  STAGE Sanity:    ${{ needs.sanity-stage.result }}"
          echo "  PROD Smoke:      ${{ needs.smoke-prod.result }}"
          echo "═══════════════════════════════════════════"